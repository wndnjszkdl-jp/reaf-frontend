<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="stylesheet" href="css/common.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마이페이지 | Re:Leaf AI</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Pretendard, "Noto Sans KR", sans-serif;
      background: #eef3ef;
      color: #1f2937;
      min-height: 100vh;
    }

    .layout {
      display: flex;
      min-height: calc(100vh - 62px);
    }

    .sidebar {
      width: 280px;
      background: #ffffff;
      border-right: 1px solid #e5e7eb;
      padding: 30px 24px;
    }

    .side-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }

    .side-brand-icon {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background: linear-gradient(135deg, #4ade80, #16a34a);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
      font-weight: bold;
    }

    .side-brand-text {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .user-card {
      background: linear-gradient(135deg, #16a34a, #15803d);
      border-radius: 24px;
      padding: 24px;
      color: white;
      margin-bottom: 24px;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 16px;
    }

    .user-name {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 6px;
      word-break: break-all;
    }

    .user-email {
      font-size: 14px;
      opacity: 0.88;
      word-break: break-all;
    }

    .crop-edit-box {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 24px;
    }

    .crop-edit-box label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      color: #14532d;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 12px;
      border: 1px solid #cfe8d6;
      font-size: 15px;
      outline: none;
      background: #ffffff;
    }

    input:focus {
      border-color: #22c55e;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.14);
    }

    button,
    .menu a {
      font-family: inherit;
    }

    .crop-btn {
      width: 100%;
      margin-top: 10px;
      padding: 12px 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #34c759, #0f9d58);
      color: white;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s;
    }

    .crop-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(15, 157, 88, 0.22);
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .menu a {
      text-decoration: none;
      color: #374151;
      padding: 14px 18px;
      border-radius: 14px;
      font-weight: 700;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .menu a:hover {
      background: #f3f4f6;
    }

    .menu .active {
      background: #16a34a;
      color: white;
    }

    .menu .danger-link {
      color: #dc2626;
    }

    .main {
      flex: 1;
      padding: 40px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      gap: 16px;
    }

    .header h1 {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -0.05em;
      color: #111827;
    }

    .header p {
      margin-top: 8px;
      color: #6b7280;
      font-weight: 500;
    }

    .edit-btn {
      background: #111827;
      color: white;
      border: none;
      padding: 14px 22px;
      border-radius: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      white-space: nowrap;
    }

    .edit-btn:hover {
      transform: translateY(-2px);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(22, 163, 74, 0.06);
    }

    .stat-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      gap: 12px;
    }

    .stat-title {
      font-size: 15px;
      color: #6b7280;
      font-weight: 700;
    }

    .icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: #dcfce7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex: 0 0 auto;
    }

    .stat-value {
      font-size: 30px;
      font-weight: 800;
      color: #111827;
      word-break: keep-all;
    }

    .activity {
      background: white;
      border-radius: 28px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(22, 163, 74, 0.06);
    }

    .activity-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      gap: 12px;
    }

    .activity-header h2 {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .view-all {
      color: #16a34a;
      font-weight: 800;
      text-decoration: none;
    }

    .activity-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 18px 0;
      border-bottom: 1px solid #f1f5f9;
    }

    .activity-item:last-child {
      border: none;
    }

    .activity-left {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .activity-icon {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      background: #ecfdf5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex: 0 0 auto;
    }

    .activity-info {
      min-width: 0;
    }

    .activity-info h4 {
      margin-bottom: 5px;
      font-size: 17px;
      color: #111827;
      word-break: break-word;
    }

    .activity-info p {
      color: #6b7280;
      font-size: 14px;
      word-break: break-word;
    }

    .badge {
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .success {
      background: #dcfce7;
      color: #15803d;
    }

    .waiting {
      background: #fef3c7;
      color: #b45309;
    }

    .error {
      background: #fee2e2;
      color: #b91c1c;
    }

    @media (max-width: 900px) {
      .layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
      }

      .main {
        padding: 25px;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>
  <div id="commonHeader"></div>

  <div class="layout">
    <aside class="sidebar">
      <div class="side-brand">
        <div class="side-brand-icon">🌿</div>
        <div class="side-brand-text">Re:Leaf</div>
      </div>

      <div class="user-card">
        <div class="avatar">👨‍🌾</div>
        <div class="user-name" id="sidebarUsername">로딩중...</div>
        <div class="user-email" id="sidebarEmail">-</div>
      </div>

      <div class="crop-edit-box">
        <label for="cropInput">심은 작물 수정</label>
        <input id="cropInput" placeholder="예: 토마토, 상추, 고추">
        <button class="crop-btn" onclick="updateCrop()">🌱 작물 수정</button>
      </div>

      <nav class="menu">
        <a href="#" class="active">🏠 대시보드</a>
        <a href="index.html">🌿 메인페이지</a>
        <a href="history.html">📈 진단 기록</a>
        <a href="account_delete.html" class="danger-link">🗑 회원탈퇴</a>
      </nav>
    </aside>

    <main class="main">
      <div class="header">
        <div>
          <h1>마이페이지</h1>
          <p>내 작물 정보와 AI 진단 기록을 확인할 수 있습니다.</p>
        </div>

        <button class="edit-btn" onclick="location.href='index.html#predictCard'">
          AI 진단하러 가기
        </button>
      </div>

      <section class="stats">
        <div class="stat-card">
          <div class="stat-top">
            <div class="stat-title">심은 작물</div>
            <div class="icon">🌱</div>
          </div>
          <div class="stat-value" id="plantedCrop">-</div>
        </div>

        <div class="stat-card">
          <div class="stat-top">
            <div class="stat-title">AI 분석 횟수</div>
            <div class="icon">🤖</div>
          </div>
          <div class="stat-value" id="diagnosisCount">0회</div>
        </div>

        <div class="stat-card">
          <div class="stat-top">
            <div class="stat-title">가입일</div>
            <div class="icon">📅</div>
          </div>
          <div class="stat-value" id="createdAt" style="font-size:18px;">-</div>
        </div>
      </section>

      <section class="activity">
        <div class="activity-header">
          <h2>최근 진단 기록</h2>
          <a class="view-all" href="history.html">전체보기</a>
        </div>

        <div id="historyList"></div>
      </section>
    </main>
  </div>

  <script>
    const API_BASE =
    window.location.hostname === "localhost" ||
    window.location.hostname === "127.0.0.1"
      ? "http://127.0.0.1:8000"
      : "https://plant-fastapi.onrender.com";

    const token = localStorage.getItem("token");

    if (!token) {
      alert("로그인이 필요합니다.");
      location.href = "login.html";
    }

    function getCropEmoji(className) {
      const name = String(className || "").toLowerCase();

      if (name.includes("토마토") || name.includes("tomato")) return "🍅";
      if (name.includes("피망") || name.includes("pepper")) return "🌶️";
      if (name.includes("감자") || name.includes("potato")) return "🥔";
      if (name.includes("옥수수") || name.includes("corn")) return "🌽";
      if (name.includes("사과") || name.includes("apple")) return "🍎";
      if (name.includes("포도") || name.includes("grape")) return "🍇";
      if (name.includes("딸기") || name.includes("strawberry")) return "🍓";
      if (name.includes("체리") || name.includes("cherry")) return "🍒";
      if (name.includes("오렌지") || name.includes("orange")) return "🍊";
      if (name.includes("복숭아") || name.includes("peach")) return "🍑";
      if (name.includes("콩") || name.includes("soybean")) return "🫘";
      if (name.includes("호박") || name.includes("squash")) return "🎃";
      if (name.includes("블루베리") || name.includes("blueberry")) return "🫐";

      return "🌱";
    }

    async function loadMyPage() {
      try {
        const res = await fetch(`${API_BASE}/me/detail`, {
          headers: {
            Authorization: `Bearer ${token}`
          }
        });

        if (!res.ok) {
          alert("로그인이 만료되었습니다.");
          localStorage.clear();
          location.href = "login.html";
          return;
        }

        const data = await res.json();
        const user = data.user || {};

        const username =
          user.nickname ||
          user.name ||
          user.username ||
          user.email ||
          "회원";

        document.getElementById("sidebarUsername").textContent = username;
        document.getElementById("sidebarEmail").textContent = user.email || user.username || "-";
        document.getElementById("createdAt").textContent = user.created_at || "-";
        document.getElementById("plantedCrop").textContent = user.planted_crop || "미등록";
        document.getElementById("diagnosisCount").textContent = (user.diagnosis_count || 0) + "회";

        const historyList = document.getElementById("historyList");
        historyList.innerHTML = "";

        if (!data.history || data.history.length === 0) {
          historyList.innerHTML = `
            <div class="activity-item">
              <div class="activity-left">
                <div class="activity-icon">🌱</div>
                <div class="activity-info">
                  <h4>아직 진단 기록이 없습니다</h4>
                  <p>AI 분석을 시작해보세요!</p>
                </div>
              </div>
              <div class="badge waiting">대기중</div>
            </div>
          `;
          return;
        }

        data.history.slice(0, 6).forEach(item => {
          const emoji = getCropEmoji(item.predicted_class);

          historyList.innerHTML += `
            <div class="activity-item">
              <div class="activity-left">
                <div class="activity-icon">${emoji}</div>
                <div class="activity-info">
                  <h4>${item.predicted_class || "알 수 없음"}</h4>
                  <p>${item.filename || "-"} · ${item.created_at || "-"}</p>
                </div>
              </div>
              <div class="badge success">${item.confidence ?? "-"}%</div>
            </div>
          `;
        });

      } catch (error) {
        console.error(error);

        const historyList = document.getElementById("historyList");
        if (historyList) {
          historyList.innerHTML = `
            <div class="activity-item">
              <div class="activity-left">
                <div class="activity-icon">⚠️</div>
                <div class="activity-info">
                  <h4>마이페이지 정보를 불러오지 못했습니다</h4>
                  <p>FastAPI 서버 연결 상태를 확인해주세요.</p>
                </div>
              </div>
              <div class="badge error">오류</div>
            </div>
          `;
        }
      }
    }

    async function updateCrop() {
      const crop = document.getElementById("cropInput").value.trim();

      if (!crop) {
        alert("작물 이름을 입력해주세요.");
        return;
      }

      const formData = new FormData();
      formData.append("planted_crop", crop);

      try {
        const res = await fetch(`${API_BASE}/me/planted-crop`, {
          method: "PUT",
          headers: {
            Authorization: `Bearer ${token}`
          },
          body: formData
        });

        if (res.ok) {
          alert("심은 작물이 수정되었습니다.");
          document.getElementById("cropInput").value = "";
          loadMyPage();
        } else {
          const data = await res.json();
          alert(data.detail || "수정에 실패했습니다.");
        }

      } catch (error) {
        console.error(error);
        alert("서버 연결 오류입니다.");
      }
    }

    loadMyPage();
  </script>

  <script src="components/header.js"></script>
</body>
</html>
