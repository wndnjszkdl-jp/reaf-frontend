<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="stylesheet" href="css/common.css">
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <title>AI 텃밭 기록</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5efd0;
      color: #3b2a1a;
      padding: 0;
    }

    .card {
      max-width: 1000px;
      margin: 102px auto 40px;
      background: white;
      border-radius: 22px;
      padding: 28px;
      box-shadow: 8px 8px 0 #8b6b3f;
      border: 5px solid #7a4b24;
    }

    h1 {
      margin-top: 0;
      color: #3f7a2d;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    button, a {
      background: #4fba49;
      color: white;
      padding: 11px 16px;
      border-radius: 10px;
      border: none;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
      margin-left: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 14px;
    }

    th {
      background: #6fae45;
      color: white;
      padding: 14px;
    }

    td {
      padding: 13px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }

    tr:nth-child(even) {
      background: #f9f4df;
    }

    .empty {
      text-align: center;
      padding: 30px;
      color: #777;
      font-weight: bold;
    }
    .rf-topbar {
      height: 62px !important;
      background: #ffffff !important;
      border-bottom: 1px solid rgba(17, 24, 39, 0.08) !important;
      display: flex !important;
      align-items: center !important;
      justify-content: space-between !important;
      padding: 0 28px 0 38px !important;
      position: sticky !important;
      top: 0 !important;
      z-index: 9999 !important;
      box-sizing: border-box !important;
    }

    .rf-brand {
      display: flex !important;
      align-items: center !important;
      gap: 8px !important;
      font-weight: 800 !important;
      font-size: 20px !important;
      color: #101828 !important;
      text-decoration: none !important;
    }

    .rf-brand-icon {
      width: 23px !important;
      height: 23px !important;
      border-radius: 50% !important;
      border: 6px solid #14b858 !important;
      border-top-color: transparent !important;
      position: relative !important;
      transform: rotate(-35deg) !important;
      flex: 0 0 auto !important;
    }

    .rf-brand-icon::before {
      content: "" !important;
      position: absolute !important;
      width: 6px !important;
      height: 6px !important;
      background: #14b858 !important;
      border-radius: 999px !important;
      right: -4px !important;
      top: -7px !important;
    }

    .rf-brand-icon::after {
      content: "" !important;
      position: absolute !important;
      width: 8px !important;
      height: 5px !important;
      background: #14b858 !important;
      border-radius: 999px 999px 0 999px !important;
      right: -3px !important;
      top: -14px !important;
      transform: rotate(35deg) !important;
    }

    .rf-nav {
      display: flex !important;
      align-items: center !important;
      gap: 27px !important;
      font-size: 15px !important;
      font-weight: 500 !important;
      color: #374151 !important;
      white-space: nowrap !important;
    }

    .rf-nav a {
      color: #374151 !important;
      text-decoration: none !important;
      background: transparent !important;
      border: none !important;
      padding: 0 !important;
      margin: 0 !important;
      font-size: 15px !important;
      font-weight: 500 !important;
    }

    .rf-nav a:hover {
      color: #049b3b !important;
    }

    .rf-nav .rf-signup-link {
      color: #ffffff !important;
      background: #049b3b !important;
      padding: 11px 17px !important;
      border-radius: 10px !important;
      font-weight: 700 !important;
    }
  </style>
</head>

<body>
<div id="commonHeader"></div>
  <div class="card">
    <div class="top">
      <h1>📋 AI 텃밭 진단 기록</h1>
      <div>
        <button onclick="loadHistory()">새로고침</button>
        <a href="index.html">텃밭으로 가기</a>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>파일명</th>
          <th>예측 결과</th>
          <th>확률</th>
          <th>저장 시간</th>
        </tr>
      </thead>
      <tbody id="historyBody">
        <tr>
          <td colspan="5" class="empty">기록을 불러오는 중이에요...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    async function loadHistory() {
      const tbody = document.getElementById("historyBody");
      tbody.innerHTML = "";

      try {
        const token = localStorage.getItem("token");

        if (!token) {
          tbody.innerHTML = `<tr><td colspan="5" class="empty">로그인 후 기록을 볼 수 있어요 🔐</td></tr>`;
          return;
        }

        const response = await fetch("/history", {
          method: "GET",
          headers: {
            "Authorization": `Bearer ${token}`
          }
        });

        if (response.status === 401) {
          localStorage.removeItem("token");
          localStorage.removeItem("username");
          tbody.innerHTML = `<tr><td colspan="5" class="empty">로그인이 만료됐어요. 다시 로그인해주세요 🔐</td></tr>`;
          return;
        }

        if (!response.ok) {
          throw new Error("서버 응답 실패");
        }
        const result = await response.json();

        if (!result.data || result.data.length === 0) {
          tbody.innerHTML = `<tr><td colspan="5" class="empty">아직 저장된 기록이 없어요 🌱</td></tr>`;
          return;
        }

        result.data.forEach(item => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${item.id}</td>
            <td>${item.filename}</td>
            <td>${item.predicted_class}</td>
            <td>${item.confidence}%</td>
            <td>${item.created_at}</td>
          `;
          tbody.appendChild(row);
        });

      } catch (error) {
        tbody.innerHTML = `<tr><td colspan="5" class="empty">서버 연결 오류입니다.</td></tr>`;
      }
    }

    loadHistory();
  </script>
<script src="components/header.js"></script>
</body>
</html>
