<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="stylesheet" href="css/common.css">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>비밀번호 찾기 | Re:Leaf AI</title>

  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(
          135deg,
          #e8fff0 0%,
          #d8ffe5 35%,
          #c7f5d5 70%,
          #b7edc8 100%
        );
    }

    .page-wrap {
      min-height: calc(100vh - 72px);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 430px;
    }

    .auth-card {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 46px 34px;
      box-shadow: 0 20px 55px rgba(15, 157, 88, 0.16);
      border: 1px solid rgba(15, 157, 88, 0.12);
    }

    .header {
      text-align: center;
      margin-bottom: 38px;
    }

    .logo {
      font-size: 56px;
      margin-bottom: 16px;
      display: inline-block;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    h1 {
      font-size: 30px;
      font-weight: 800;
      color: #123524;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 15px;
      color: #5f6f66;
      font-weight: 400;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: #14532d;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      height: 52px;
      border: 1px solid #cfe8d6;
      border-radius: 14px;
      padding: 0 16px;
      font-size: 15px;
      font-family: inherit;
      background: #f8fff9;
      color: #1f2937;
      transition: all 0.3s ease;
      outline: none;
    }

    input::placeholder {
      color: #9ca3af;
    }

    input:focus {
      background: white;
      border-color: #22c55e;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.14);
    }

    .btn-submit {
      width: 100%;
      height: 54px;
      margin-top: 26px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #34c759, #0f9d58);
      color: white;
      font-size: 16px;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 26px rgba(15, 157, 88, 0.22);
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 32px rgba(15, 157, 88, 0.3);
    }

    .message {
      min-height: 24px;
      margin-top: 18px;
      font-size: 14px;
      font-weight: 700;
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      display: none;
    }

    .message.show {
      display: block;
    }

    .message.success {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .message.error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .link-group {
      margin-top: 28px;
      text-align: center;
      line-height: 2;
    }

    .link {
      display: inline-block;
      margin: 0 8px;
      font-size: 14px;
      color: #0f9d58;
      text-decoration: none;
      font-weight: 700;
    }

    .link:hover {
      text-decoration: underline;
    }

    .btn-submit.loading {
      pointer-events: none;
      opacity: 0.8;
    }

    @media (max-width: 480px) {
      .auth-card {
        padding: 36px 24px;
      }

      h1 {
        font-size: 26px;
      }

      .logo {
        font-size: 48px;
      }
    }
  </style>
</head>

<body>
  <div id="commonHeader"></div>

  <main class="page-wrap">
    <div class="container">
      <div class="auth-card">

        <div class="header">
          <div class="logo">🔑</div>

          <h1>비밀번호 찾기</h1>

          <p class="subtitle">
            계정 정보를 입력하고<br>
            새로운 비밀번호로 변경해주세요
          </p>
        </div>

        <div class="form-group">
          <label for="username">아이디</label>

          <input
            type="text"
            id="username"
            placeholder="아이디를 입력하세요"
            autocomplete="username"
          />
        </div>

        <div class="form-group">
          <label for="newPassword">새 비밀번호</label>

          <input
            type="password"
            id="newPassword"
            placeholder="새 비밀번호를 입력하세요"
            autocomplete="new-password"
          />
        </div>

        <button class="btn-submit" onclick="resetPassword()">
          비밀번호 변경하기
        </button>

        <div id="result" class="message"></div>

        <div class="link-group">
          <a class="link" href="login.html">로그인</a>
          <span style="color:#ddd;">|</span>
          <a class="link" href="register.html">회원가입</a>
          <span style="color:#ddd;">|</span>
          <a class="link" href="index.html">← 돌아가기</a>
        </div>

      </div>
    </div>
  </main>

  <script>
    async function resetPassword() {

      const username =
        document.getElementById("username").value.trim();

      const newPassword =
        document.getElementById("newPassword").value.trim();

      const result =
        document.getElementById("result");

      result.className = "message";

      if (!username) {
        showMessage("아이디를 입력해주세요.", "error");
        return;
      }

      if (!newPassword) {
        showMessage("새 비밀번호를 입력해주세요.", "error");
        return;
      }

      const formData = new FormData();

      formData.append("username", username);
      formData.append("new_password", newPassword);

      try {

        const response = await fetch("/reset-password", {
          method: "POST",
          body: formData
        });

        const data = await response.json();

        if (response.ok) {

          showMessage(
            data.message || "비밀번호가 변경되었습니다.",
            "success"
          );

          setTimeout(() => {
            window.location.href = "login.html";
          }, 1200);

        } else {

          showMessage(
            data.detail || "비밀번호 변경 실패",
            "error"
          );
        }

      } catch (error) {

        showMessage(
          "서버 연결에 실패했습니다.",
          "error"
        );
      }
    }

    function showMessage(text, type) {

      const result =
        document.getElementById("result");

      result.textContent = text;
      result.className =
        `message show ${type}`;
    }
  </script>

  <script src="components/header.js"></script>
</body>
</html>
